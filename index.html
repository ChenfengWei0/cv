<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CV | Wei Chenfeng</title>
  <style>
    :root { color-scheme: light dark; }
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji"; }
    header { padding: 16px 20px; border-bottom: 1px solid rgba(128,128,128,.3); }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .btn {
      appearance: none;
      border: 1px solid rgba(128,128,128,.6);
      background: transparent;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn[aria-pressed="true"] { border-width: 2px; }
    a { color: inherit; }
    .meta { opacity: .85; font-size: 14px; }
    main { height: calc(100vh - 82px); } /* adjust if header wraps */
    iframe { width: 100%; height: 100%; border: 0; }
    .spacer { flex: 1; }
  </style>
</head>
<body>
  <header>
    <div class="row">
      <button id="btn-en" class="btn" aria-pressed="true">English CV</button>
      <button id="btn-cn" class="btn" aria-pressed="false">中文简历</button>

      <div class="spacer"></div>

      <div class="meta">
        View / Download:
        <a id="dl" href="CV_EN.pdf" download>CV_EN.pdf</a>
      </div>
    </div>
  </header>

  <main>
    <iframe id="viewer" src="CV_EN.pdf" title="CV viewer"></iframe>
  </main>

  <script>
    (function () {
      const files = {
        en: { pdf: "CV_EN.pdf", label: "CV_EN.pdf", btn: "btn-en" },
        cn: { pdf: "CV_CN.pdf", label: "CV_CN.pdf", btn: "btn-cn" }
      };

      const viewer = document.getElementById("viewer");
      const dl = document.getElementById("dl");
      const btnEn = document.getElementById("btn-en");
      const btnCn = document.getElementById("btn-cn");

      function setActive(lang) {
        const f = files[lang];
        // Update iframe (add a cache-buster to avoid stale loads)
        viewer.src = f.pdf + "?v=" + Date.now();

        // Update download link text + href
        dl.href = f.pdf;
        dl.textContent = f.label;

        // Toggle button states
        btnEn.setAttribute("aria-pressed", lang === "en" ? "true" : "false");
        btnCn.setAttribute("aria-pressed", lang === "cn" ? "true" : "false");

        // Optional: update page title
        document.title = "CV | " + (lang === "en" ? "English" : "中文");
      }

      btnEn.addEventListener("click", () => setActive("en"));
      btnCn.addEventListener("click", () => setActive("cn"));

      // Default is English; you can change to "cn" if you prefer
      setActive("en");
    })();
  </script>
</body>
</html>
